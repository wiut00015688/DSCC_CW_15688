{% extends 'tasks/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Tasks</h2>
    <a href="{% url 'task_create' %}" class="btn btn-dark">+ New Task</a>
</div>
<form method="GET" class="row g-2 mb-4">
    <div class="col-md-4">
        <select name="status" class="form-select">
            <option value="">All Statuses</option>
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
        </select>
    </div>
    <div class="col-md-4">
        <select name="category" class="form-select">
            <option value="">All Categories</option>
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-outline-dark w-100">Filter</button>
    </div>
</form>
<div class="row">
    {% for task in tasks %}
        <div class="col-md-6 mb-3">
            <div class="card p-3">
                <div class="d-flex justify-content-between">
                    <h5>{{ task.title }}</h5>
                    <span class="badge bg-secondary">{{ task.get_status_display }}</span>
                </div>
                <p class="text-muted small">{{ task.description|truncatechars:80 }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge bg-warning text-dark">{{ task.get_priority_display }}</span>
                    <div>
                        <a href="{% url 'task_detail' task.pk %}" class="btn btn-sm btn-outline-dark">View</a>
                        <a href="{% url 'task_edit' task.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                        <a href="{% url 'task_delete' task.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                    </div>
                </div>
            </div>
        </div>
    {% empty %}
        <p class="text-muted">No tasks found.</p>
    {% endfor %}
</div>
{% endblock %}
