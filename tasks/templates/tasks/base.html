<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #343a40 !important; }
        .card { border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .badge-todo { background-color: #6c757d; }
        .badge-in_progress { background-color: #ffc107; color: #000; }
        .badge-done { background-color: #28a745; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">📋 Task Manager</a>
        <div class="navbar-nav ms-auto">
            {% if request.user.is_authenticated %}
                <a class="nav-link text-white" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="nav-link text-white" href="{% url 'task_list' %}">My Tasks</a>
                <a class="nav-link text-white" href="{% url 'task_create' %}">+ New Task</a>
                <a class="nav-link text-warning" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="nav-link text-white" href="{% url 'login' %}">Login</a>
                <a class="nav-link text-white" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
